name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., v1.13.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Prepare release directory
        run: |
          mkdir -p release
          cp -r dist release/
          cp action.yml release/
          cp package.json release/

      - name: Deploy to release/v1
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./release
          publish_branch: release/v1
          force_orphan: true
          tag_name: ${{ inputs.version }}
          tag_message: "Release ${{ inputs.version }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Release ${{ inputs.version }}"
